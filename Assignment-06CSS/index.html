<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Product Card</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="card">
        <div class="text">
        <h1>Delicious Berries</h1>
        <h6>COD: 45999</h6>
        <p><span>RS</span>7.93</p>
        <h3>select a berry</h3>
        <div class="berry rasp"></div>
            <div class="berry blue"></div>
            <div class="berry straw"></div>
            <div class="berry black"></div>
            <h3>benefits</h3>
            <ul>
                <li>Strawberry: supports immunity and skin vitality</li>
                <li>Blackberry: helps in digestion & bone development</li>
                <li>Raspberry: A great source of fiber and vitamin K</li>
                <li>Blueberry: improves brain function & heart health</li>
            </ul>
            <button class="addtocart">add to cart</button>
            </div>
        <div class="product">
            <div class="mixberries">
                <span class="streamline--share-link-solid"></span>
                <span class="mdi--heart-outline"></span>
                <img class="berries-img" src="./asset/fresh-berries.png" alt="fresh berries">
            </div>
            <div class="singleberry rasp"></div>
            <div class="singleberry blue"></div>
            <div class="singleberry straw"></div>
            <div class="singleberry black"></div>
        </div>
    </div>
</body>
</html>
